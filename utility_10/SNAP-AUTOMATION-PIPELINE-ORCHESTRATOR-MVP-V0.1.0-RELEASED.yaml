locked_decisions:
  LOCKED-1: Utility #10 is an orchestration layer, not a replacement for Utility #7, #8, or #9.
  LOCKED-2: Utility #10 coordinates through CLI adapters and JSON/YAML contracts.
  LOCKED-3: No direct package dependency is introduced between Utility #7, Utility #8, Utility #9, and Utility #10.
  LOCKED-4: MVP v0.1.0 supports sequential two-stage orchestration only.
  LOCKED-5: Pipeline YAML is the control contract for Utility #10.
  LOCKED-6: Pipeline Log JSON is the audit trail for Utility #10.

