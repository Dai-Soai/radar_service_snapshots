locked_architecture_principles:
workflow_py:
role: contract only
allowed:
- WorkflowStep
- WorkflowOptions
- WorkflowSpec
- workflow JSON loading
- workflow validation
forbidden_imports:
- workflow_automation.executor
- workflow_automation.runner
- workflow_automation.cli
executor_py:
role: step execution
owns:
- StepExecutionResult
- step execution logic
- pipeline step dispatch
- index step dispatch
runner_py:
role: orchestration
owns:
- workflow spec loading
- CLI override application
- dry-run handling
- enabled step execution
- optional Knowledge Search query
- final workflow status
cli_py:
role: terminal interface
owns:
- argparse
- CLI flags
- terminal output formatting
telegram_py:
role: Telegram-facing adapter
owns:
- Telegram command parsing
- mock Telegram command routing
- compact chat response formatting
- bridge to workflow runner

critical_lessons:
circular_import_boundary:
valid_direction:
- cli.py -> runner.py
- runner.py -> executor.py
- executor.py -> workflow.py
forbidden_direction:
- workflow.py -> executor.py
- workflow.py -> runner.py
- workflow.py -> cli.py
test_strategy: >
External CLI integrations should be validated through contracts and smoke
tests, while subprocess-heavy behavior should remain lightweight in unit tests.

