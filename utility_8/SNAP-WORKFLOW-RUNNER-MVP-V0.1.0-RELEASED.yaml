locked_architecture:
  flow:
    - workflow.yaml
    - Loader
    - Validator
    - Executor
    - Action Registry
    - Actions
    - Workflow Result
    - Execution Log JSON

locked_integration_boundary:
  flow:
    - "Utility #7 — File Watcher Automation MVP"
    - event contract
    - "Utility #8 — Workflow Runner MVP"
    - execution log
  utility_7_owns:
    - file detection
    - event creation
    - inbox/archive movement
    - file watcher event log
  utility_8_owns:
    - workflow loading
    - workflow validation
    - sequential step execution
    - action registry
    - workflow execution log
  dependency_decision: "No direct package dependency is introduced between Utility #7 and Utility #8."

locked_decisions:
  LOCKED-1: Workflow Runner MVP is a YAML-driven workflow utility.
  LOCKED-2: Workflow definitions are declared in YAML, not hardcoded Python pipelines.
  LOCKED-3: Python owns loader, validator, executor, action registry, and logging.
  LOCKED-4: MVP v0.1.0 supports sequential execution only.
  LOCKED-5: MVP v0.1.0 supports local workflow execution only.
  LOCKED-6: Execution Log JSON is the audit trail for Utility #8.
  LOCKED-7: Utility #8 integrates with Utility #7 through example-level event contracts, not direct package dependency.
  LOCKED-8: Release version is locked as v0.1.0.

