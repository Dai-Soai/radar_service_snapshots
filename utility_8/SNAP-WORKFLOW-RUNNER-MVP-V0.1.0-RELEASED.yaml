context: >
  Utility #8 — Workflow Runner MVP is a minimal YAML-driven workflow engine
  for RADAR Services utilities. It executes local workflows defined in YAML,
  validates workflow contracts, runs sequential actions, exports outputs,
  and writes JSON execution logs.

